databaseChangeLog:
  - changeSet:
      id: 1
      author: diego
      changes:
        - createTable:
            tableName: reporte
            columns:
              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: titulo
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: descripcion
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: cantidad_reservas
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: monto_total_pagos
                  type: DOUBLE
                  constraints:
                    nullable: false
              - column:
                  name: generado
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: fecha_generacion
                  type: DATE
                  constraints:
                    nullable: false